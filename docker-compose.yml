version: "3.9"

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAG_DB_PATH=/app/storage/rag_app.db
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
